name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Enviar NEXO Card para Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Aguardar configuracao dos secrets FTP
        if: ${{ env.FTP_SERVER == '' || env.FTP_USERNAME == '' || env.FTP_PASSWORD == '' || env.FTP_SERVER_DIR == '' }}
        run: |
          echo "Secrets FTP ainda nao configurados."
          echo "Crie FTP_SERVER, FTP_USERNAME, FTP_PASSWORD e FTP_SERVER_DIR em Settings > Secrets and variables > Actions."

      - name: Enviar NEXO Card para Hostinger via FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' && env.FTP_SERVER_DIR != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_SERVER_DIR }}
          local-dir: ./card/
          port: 21
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.github*/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/*.md
            README*
