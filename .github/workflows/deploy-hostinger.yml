name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Enviar publicar para Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      BEFORE_SHA: ${{ github.event.before }}
      CURRENT_SHA: ${{ github.sha }}

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Aguardar configuracao dos secrets FTP
        if: ${{ env.FTP_SERVER == '' || env.FTP_USERNAME == '' || env.FTP_PASSWORD == '' }}
        run: |
          echo "Secrets FTP ainda nao configurados."
          echo "Crie FTP_SERVER, FTP_USERNAME e FTP_PASSWORD em Settings > Secrets and variables > Actions."

      - name: Validar host FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        shell: bash
        run: |
          if [[ "$FTP_SERVER" == ftp://* || "$FTP_SERVER" == ftps://* ]]; then
            echo "::error title=FTP_SERVER invalido::Use somente o host, sem ftp://. Exemplo correto: 45.132.157.108"
            exit 1
          fi
          echo "Host FTP sem prefixo de protocolo."

      - name: Enviar publicar para Hostinger via FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        shell: bash
        run: |
          python3 <<'PY'
          from ftplib import FTP, error_perm
          from pathlib import Path
          import os
          import posixpath
          import subprocess
          import time

          server = (os.environ["FTP_SERVER"] or "").replace("ftp://", "").replace("ftps://", "").strip().strip("/")
          username = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]
          remote_root = "/domains/primusdf.com.br/public_html"
          local_root = Path(".").resolve()
          skip_dirs = {".git", ".github", "node_modules"}
          force_upload = {
              Path("deploy-check.txt"),
              Path("contas/index.html"),
              Path("contas/sw.js"),
              Path("baixador/api/analyze.php"),
              Path("baixador/api/common.php"),
              Path("baixador/api/download.php"),
              Path("baixador/api/health.php"),
              Path("baixador/cookies/.htaccess"),
              Path("baixador/cookies/README.txt"),
              Path("baixador/public/app.js"),
              Path("baixar/api/analyze.php"),
              Path("baixar/api/common.php"),
              Path("baixar/api/download.php"),
              Path("baixar/api/health.php"),
              Path("baixar/cookies/.htaccess"),
              Path("baixar/cookies/README.txt"),
              Path("baixar/public/app.js"),
          }
          obsolete_files = {"card/assets/nexo-card-tutorial.mp4"}

          def should_skip(path: Path) -> bool:
              parts = set(path.parts)
              if parts & skip_dirs:
                  return True
              name = path.name
              lower = name.lower()
              if lower.startswith(".") and lower != ".htaccess":
                  return True
              if lower == ".ds_store" or lower.startswith(".env"):
                  return True
              if lower.endswith(".md") or lower.startswith("readme"):
                  return True
              return False

          def changed_paths():
              before = (os.environ.get("BEFORE_SHA") or "").strip()
              current = (os.environ.get("CURRENT_SHA") or "HEAD").strip()
              upload = set()
              delete = set()

              if before and not before.startswith("0000000"):
                  result = subprocess.run(
                      ["git", "diff", "--name-status", before, current],
                      check=False,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                  )
                  if result.returncode != 0:
                      print("Diff pelo SHA anterior falhou; seguindo com arquivos-chave.")
                      print(result.stdout)
                      result = subprocess.run(
                          ["git", "diff", "--name-status", "HEAD~1", "HEAD"],
                          check=False,
                          text=True,
                          stdout=subprocess.PIPE,
                          stderr=subprocess.STDOUT,
                      )
                  if result.returncode != 0:
                      print("Diff local tambem falhou; seguindo apenas com arquivos-chave.")
                      print(result.stdout)
                      return force_upload, set(Path(p) for p in obsolete_files)
                  for line in result.stdout.splitlines():
                      parts = line.split("\t")
                      if not parts:
                          continue
                      status = parts[0]
                      if status.startswith("D") and len(parts) >= 2:
                          delete.add(Path(parts[1]))
                      elif status.startswith("R") and len(parts) >= 3:
                          delete.add(Path(parts[1]))
                          upload.add(Path(parts[2]))
                      elif len(parts) >= 2:
                          upload.add(Path(parts[-1]))
              else:
                  upload.update(p.relative_to(local_root) for p in local_root.rglob("*") if p.is_file())

              upload.update(force_upload)
              delete.update(Path(p) for p in obsolete_files)
              return upload, delete

          def ensure_remote_dir(ftp: FTP, rel_dir: str) -> None:
              ftp.cwd(remote_root)
              if rel_dir in ("", "."):
                  return
              for part in rel_dir.split("/"):
                  if not part:
                      continue
                  try:
                      ftp.cwd(part)
                  except error_perm:
                      ftp.mkd(part)
                      ftp.cwd(part)

          def connect_ftp() -> FTP:
              last_error = None
              for attempt in range(1, 6):
                  ftp = FTP()
                  try:
                      print(f"Conectando no FTP, tentativa {attempt}/5...")
                      ftp.connect(server, 21, timeout=30)
                      ftp.login(username, password)
                      ftp.set_pasv(True)
                      if ftp.sock:
                          ftp.sock.settimeout(90)
                      ftp.cwd(remote_root)
                      return ftp
                  except Exception as exc:
                      last_error = exc
                      try:
                          ftp.close()
                      except Exception:
                          pass
                      print(f"Tentativa {attempt}/5 falhou: {type(exc).__name__}: {exc}")
                      time.sleep(8)
              raise last_error

          ftp = connect_ftp()

          def upload_file(rel_path: Path, file_path: Path) -> int:
              global ftp
              rel_posix = rel_path.as_posix()
              rel_dir = posixpath.dirname(rel_posix)
              filename = posixpath.basename(rel_posix)
              local_size = file_path.stat().st_size
              last_error = None
              for attempt in range(1, 4):
                  try:
                      ensure_remote_dir(ftp, rel_dir)
                      with file_path.open("rb") as handle:
                          ftp.storbinary(f"STOR {filename}", handle)
                      print(f"upload {rel_posix} ({local_size} bytes)")
                      return 1
                  except Exception as exc:
                      last_error = exc
                      print(f"upload retry {rel_posix}, tentativa {attempt}/3: {type(exc).__name__}: {exc}")
                      try:
                          ftp.close()
                      except Exception:
                          pass
                      time.sleep(4)
                      ftp = connect_ftp()
              raise last_error

          upload_paths, delete_paths = changed_paths()
          uploaded = 0
          for rel_path in sorted(upload_paths, key=lambda item: item.as_posix()):
              if should_skip(rel_path):
                  continue
              file_path = local_root / rel_path
              if not file_path.is_file():
                  continue

              uploaded += upload_file(rel_path, file_path)

          for rel_path in sorted(delete_paths, key=lambda item: item.as_posix()):
              if should_skip(rel_path):
                  continue
              obsolete_file = rel_path.as_posix()
              try:
                  ftp.cwd(remote_root)
                  ftp.delete(obsolete_file)
                  print(f"remove obsolete {obsolete_file}")
              except Exception:
                  pass

          try:
              ftp.quit()
          except Exception:
              try:
                  ftp.close()
              except Exception:
                  pass
          print(f"Deploy FTP concluido. Enviados: {uploaded}.")
          PY

      - name: Conferir dominio publicado
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        shell: bash
        run: |
          python3 <<'PY'
          from urllib.request import Request, urlopen
          import sys
          import time

          stamp = str(int(time.time()))

          def get(url):
              req = Request(url + "?v=" + stamp, headers={"Cache-Control": "no-cache", "Pragma": "no-cache"})
              with urlopen(req, timeout=30) as res:
                  return res.read().decode("utf-8", "replace")

          import json

          marker = get("https://primusdf.com.br/deploy-check.txt")
          baixador = get("https://primusdf.com.br/baixador/")
          manifest = get("https://primusdf.com.br/baixador/manifest.webmanifest")
          health = json.loads(get("https://primusdf.com.br/baixador/api/health"))

          checks = [
              ("marcador de deploy", "deploy-check-publicar-20260604-0029" in marker),
              ("baixador publicado", "BaixaNEXO" in baixador and "data-download-form" in baixador),
              ("manifest do BaixaNEXO", "BaixaNEXO" in manifest and "/baixador/" in manifest),
              ("health ok", health.get("ok") is True),
              ("php pode executar processos", health.get("exec") is True),
              ("yt-dlp pronto", health.get("ytdlpReady") is True),
              ("ffmpeg pronto", health.get("ffmpegReady") is True),
          ]

          failed = [name for name, ok in checks if not ok]
          if failed:
              print("Falhou na conferencia do dominio:")
              for name in failed:
                  print("- " + name)
              sys.exit(1)

          print("Dominio conferido com BaixaNEXO publicado.")
          PY
