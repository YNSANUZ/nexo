name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Enviar publicar para Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Aguardar configuracao dos secrets FTP
        if: ${{ env.FTP_SERVER == '' || env.FTP_USERNAME == '' || env.FTP_PASSWORD == '' }}
        run: |
          echo "Secrets FTP ainda nao configurados."
          echo "Crie FTP_SERVER, FTP_USERNAME e FTP_PASSWORD em Settings > Secrets and variables > Actions."

      - name: Validar host FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        shell: bash
        run: |
          if [[ "$FTP_SERVER" == ftp://* || "$FTP_SERVER" == ftps://* ]]; then
            echo "::error title=FTP_SERVER invalido::Use somente o host, sem ftp://. Exemplo correto: 45.132.157.108"
            exit 1
          fi
          echo "Host FTP sem prefixo de protocolo."

      - name: Instalar cliente FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Enviar publicar para Hostinger via FTP
        if: ${{ env.FTP_SERVER != '' && env.FTP_USERNAME != '' && env.FTP_PASSWORD != '' }}
        shell: bash
        run: |
          REMOTE_DIR="${FTP_SERVER_DIR:-public_html/}"
          REMOTE_DIR="${REMOTE_DIR%/}/"
          echo "Destino FTP: $REMOTE_DIR"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<LFTP
          set cmd:fail-exit yes
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 120
          set net:max-retries 4
          set net:reconnect-interval-base 5
          mkdir -p "$REMOTE_DIR"
          mirror --reverse --only-newer --verbose \
            --exclude-glob ".git*" \
            --exclude-glob ".git/**" \
            --exclude-glob ".github/**" \
            --exclude-glob "node_modules/**" \
            --exclude-glob ".env" \
            --exclude-glob ".env.*" \
            --exclude-glob "*.md" \
            --exclude-glob "README*" \
            ./ "$REMOTE_DIR"
          bye
          LFTP
