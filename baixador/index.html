<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="./public/" />
    <title>BaixaNEXO</title>
    <meta name="theme-color" content="#087df4" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="icon" href="https://i.ibb.co/KczGYz6v/11-layout-primus-1.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=20260616-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="cube-scene" aria-hidden="true">
          <canvas id="downloadCubeCanvas" width="420" height="360"></canvas>
        </div>

        <p class="eyebrow" data-source-pill>Link publico</p>
        <h1 id="page-title">BaixaNEXO</h1>
        <p class="hero-copy">Cole um link e receba as opcoes limpas de midia disponiveis.</p>

        <form class="download-form" data-download-form>
          <label class="sr-only" for="mediaUrl">Cole o link da midia</label>
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1" />
              <path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1" />
            </svg>
          </span>
          <input id="mediaUrl" name="url" type="url" autocomplete="off" spellcheck="false" placeholder="Cole aqui o link do video, reel, shorts ou foto" data-url-input />
          <button class="search-button" type="submit" aria-label="Analisar link">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <path d="M7 10l5 5 5-5" />
              <path d="M12 15V3" />
            </svg>
          </button>
        </form>

        <div class="supported-types" data-supported-types aria-label="Tipos suportados"></div>

        <p class="trust-note">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
            <path d="m9 12 2 2 4-5" />
          </svg>
          Use apenas conteudos publicos que voce tem direito de salvar
        </p>
      </section>

      <section class="results-panel" data-results-panel hidden aria-live="polite">
        <div class="state-row" data-loading hidden>
          <span class="spinner" aria-hidden="true"></span>
          <strong>Analisando link...</strong>
        </div>

        <div class="state-row error-row" data-error hidden>
          <strong data-error-title>Nao foi possivel analisar.</strong>
          <span data-error-message></span>
        </div>

        <div class="results-content" data-results-content hidden>
          <div class="media-layout">
            <div class="preview-shell" data-preview-shell></div>

            <div class="media-info">
              <div class="meta-line">
                <span class="type-badge" data-kind-label>Midia</span>
                <span data-source-label>Fonte</span>
              </div>
              <h2 data-media-title>BaixaNEXO</h2>
              <p data-media-meta></p>

              <div class="primary-actions">
                <a class="action-button primary" href="#" data-best-video download>
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <path d="M7 10l5 5 5-5" />
                    <path d="M12 15V3" />
                  </svg>
                  <span data-primary-download-label>MP4 melhor</span>
                </a>
                <a class="action-button" href="#" data-mp3-download download>
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                  </svg>
                  MP3
                </a>
                <a class="icon-button" href="#" data-source-open target="_blank" rel="noopener noreferrer" aria-label="Abrir origem">
                  <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                    <path d="M15 3h6v6" />
                    <path d="M10 14 21 3" />
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                  </svg>
                </a>
              </div>
            </div>
          </div>

          <div class="items-strip" data-items-strip hidden></div>

          <div class="formats-head">
            <h3>Opcoes encontradas</h3>
            <span data-format-count></span>
          </div>
          <div class="formats-list" data-formats-list></div>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260616-2"></script>
    <script type="module" src="./cube.js?v=20260616-2"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          const path = window.location.pathname;
          const scope = path.includes("/baixador/") ? "/baixador/" : "/";
          navigator.serviceWorker.register(`${scope}sw.js`, { scope }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
